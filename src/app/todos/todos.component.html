<div class="todos-page">
  <header class="page-header">
    <h1 class="ph-h1 todos-title">To-Do</h1>
  </header>
  <div class="add-task-row">
    <button type="button" class="ph-btn ph-btn-primary add-task-btn" (click)="openAddForm()">
      Aggiungi to do
    </button>
  </div>

  @if (showAddForm() && !editingId()) {
    <section class="add-form-card ph-card">
      <h2 class="ph-h3 form-title">Nuova attività</h2>
      <label class="label" for="new-title">Titolo</label>
      <div class="input-container">
        <input
          id="new-title"
          type="text"
          placeholder="Titolo dell'attività"
          [ngModel]="newTitle()"
          (ngModelChange)="newTitle.set($event)"
        />
      </div>
      <label class="label" for="new-desc">Descrizione (opzionale)</label>
      <textarea
        id="new-desc"
        class="ph-input note-textarea"
        rows="2"
        placeholder="Dettagli..."
        [ngModel]="newDescription()"
        (ngModelChange)="newDescription.set($event)"
      ></textarea>
      <div class="form-actions">
        <button type="button" class="ph-btn ph-btn-secondary" (click)="closeAddForm()">Annulla</button>
        <button type="button" class="ph-btn ph-btn-primary" (click)="add()" [disabled]="!newTitle().trim()">Salva</button>
      </div>
    </section>
  }

  <section class="todos-timeline">
    @for (item of items(); track item.id; let i = $index) {
      <div class="timeline-item" [@listItem]>
        <div class="timeline-marker" [class.filled]="i === 0 && !item.completed"></div>
        @if (editingId() === item.id) {
          <div class="todo-card todo-card-edit ph-card">
            <label class="label">Titolo</label>
            <input type="text" class="ph-input" [ngModel]="editTitle()" (ngModelChange)="editTitle.set($event)" />
            <label class="label">Descrizione</label>
            <textarea class="ph-input note-textarea" rows="2" [ngModel]="editDescription()" (ngModelChange)="editDescription.set($event)"></textarea>
            <div class="form-actions">
              <button type="button" class="ph-btn ph-btn-secondary" (click)="cancelEdit()">Annulla</button>
              <button type="button" class="ph-btn ph-btn-primary" (click)="saveEdit()">Salva</button>
            </div>
          </div>
        } @else {
          <div
            class="todo-card ph-card"
            [style.--card-color]="getCardColor(i)"
            [class.completed]="item.completed"
          >
            <button type="button" class="todo-card-inner" (click)="toggle(item)">
              <span class="todo-time ph-caption">{{ formatTime(item.createdAt) }}</span>
              <h3 class="todo-card-title">{{ item.title }}</h3>
              @if (item.description) {
                <p class="todo-card-desc ph-body">{{ item.description }}</p>
              }
            </button>
            <div class="todo-card-actions">
              <button type="button" class="todo-action-btn" (click)="startEdit(item); $event.stopPropagation()" aria-label="Modifica">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                  <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                </svg>
              </button>
              <button type="button" class="todo-action-btn danger" (click)="remove(item); $event.stopPropagation()" aria-label="Elimina">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                  <line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/>
                </svg>
              </button>
            </div>
          </div>
        }
      </div>
    }
    @empty {
      <div class="empty-state">
        <p class="ph-body">Nessuna attività. Tocca "Aggiungi task" per iniziare.</p>
      </div>
    }
  </section>
</div>
