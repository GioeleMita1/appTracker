<section class="dashboard-section">
  <h2 class="section-title">Riepilogo mese</h2>
  <div class="dashboard-cards">
    <div class="dashboard-card ph-card card-income">
      <div class="card-icon" aria-hidden="true">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="12" y1="19" x2="12" y2="5"/>
          <polyline points="5 12 12 5 19 12"/>
        </svg>
      </div>
      <span class="card-value">{{ formatCurrency(income()) }}</span>
      <span class="card-label">Entrate</span>
    </div>
    <div class="dashboard-card ph-card card-expense">
      <div class="card-icon" aria-hidden="true">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="12" y1="5" x2="12" y2="19"/>
          <polyline points="19 12 12 19 5 12"/>
        </svg>
      </div>
      <span class="card-value">{{ formatCurrency(expense()) }}</span>
      <span class="card-label">Uscite</span>
    </div>
    <div class="dashboard-card ph-card card-net">
      <div class="card-icon" aria-hidden="true">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="12" y1="1" x2="12" y2="23"/>
          <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
        </svg>
      </div>
      <span class="card-value" [class.negative]="net() < 0">{{ formatCurrency(net()) }}</span>
      <span class="card-label">Saldo netto</span>
    </div>
    <div class="dashboard-card ph-card card-count">
      <div class="card-icon" aria-hidden="true">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="8" y1="6" x2="21" y2="6"/>
          <line x1="8" y1="12" x2="21" y2="12"/>
          <line x1="8" y1="18" x2="21" y2="18"/>
          <line x1="3" y1="6" x2="3.01" y2="6"/>
          <line x1="3" y1="12" x2="3.01" y2="12"/>
          <line x1="3" y1="18" x2="3.01" y2="18"/>
        </svg>
      </div>
      <span class="card-value card-value-num">{{ count() }}</span>
      <span class="card-label">Movimenti</span>
    </div>
  </div>
  <div class="total-balance-card ph-card">
    <span class="total-label">Saldo totale</span>
    <span class="total-value" [class.negative]="totalBalance() < 0">{{ formatCurrency(totalBalance()) }}</span>
  </div>
</section>
